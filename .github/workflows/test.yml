name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14  # Apple Silicon
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install dependencies
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev]"
          uv pip install scipy

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

      - name: Import smoke test
        run: uv run python -c "import open3d_mlx; print(open3d_mlx.__version__)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python and lint
        run: |
          uv python install 3.12
          uv venv .venv
          uv pip install ruff
          uv run ruff check open3d_mlx/ tests/

  benchmark:
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv .venv
          uv pip install -e ".[dev]"
          uv pip install scipy

      - name: Run benchmarks
        run: uv run pytest benchmarks/ --benchmark-only --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
